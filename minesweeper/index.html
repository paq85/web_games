<!DOCTYPE html>
<html lang="en">
<head>

  <title>Minesweeper</title>
  <link rel="stylesheet" href="css/styles.css">

  <script src="js/board.js"></script>
  <script src="js/timer.js"></script>

  <script src="js/audio.js"></script>

</html>
