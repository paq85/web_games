<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-pvp">PvP</button>
      <button class="mode-btn" id="btn-ai">vs AI</button>
    </div>

    <div class="status" id="status" role="status" aria-live="polite">X's turn</div>

    <div class="board" id="board"></div>

    <div class="scoreboard">
      <div class="score-item score-x">
        <span class="score-label">X Wins</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-item score-draw">
        <span class="score-label">Draws</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score-item score-o">
        <span class="score-label">O Wins</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" id="btn-new-game">New Game</button>
      <button class="btn" id="btn-reset-scores">Reset Scores</button>
    </div>

    <p class="hint">Arrow keys / WASD to navigate &middot; Enter to play &middot; N = new game &middot; M = toggle mode</p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
