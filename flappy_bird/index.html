<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" role="application" aria-label="Flappy Bird game - press Space, Arrow Up, click, or tap to fly" tabindex="0"></canvas>
  </div>
  <div id="back-link">
    <a href="../index.html">&larr; Back to Games</a>
  </div>
  <div id="game-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <div id="game-alerts" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <script src="js/constants.js"></script>
  <script src="js/game.js"></script>
  <script src="js/input.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
