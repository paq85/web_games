<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Frogger - Traffic & River Crossing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background-color: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      padding: 10px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 4px;
      font-size: 0.9rem;
      color: #888;
      flex-wrap: wrap;
      gap: 4px;
    }

    #hud > div {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #hud span {
      color: #00ff88;
      font-weight: bold;
    }

    #timer-container {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 2px;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: #00ff88;
      transition: width 0.1s linear, background 0.3s;
      border-radius: 4px;
    }

    #timer-bar.danger {
      background: #ff4444;
    }

    #canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      border: 2px solid #2a2a4a;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    canvas:focus {
      outline: 2px solid #00ff88;
      outline-offset: 2px;
    }

    /* Mute button */
    #mute-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 1.1rem;
      cursor: pointer;
      color: #e0e0e0;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mute-btn:hover {
      border-color: #00ff88;
    }

    /* Screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* D-pad for mobile */
    #dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      user-select: none;
      -webkit-user-select: none;
    }

    .dpad-row {
      display: flex;
      gap: 4px;
    }

    .dpad-btn {
      width: 56px;
      height: 56px;
      background: #1a1a2e;
      border: 2px solid #3a3a5a;
      border-radius: 8px;
      color: #00ff88;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .dpad-btn:active {
      background: #2a2a4e;
      border-color: #00ff88;
    }

    .dpad-placeholder {
      width: 56px;
      height: 56px;
    }

    .dpad-pause {
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      #dpad {
        display: flex;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #timer-bar {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>
        <span id="hud-score">Score: 0</span>
      </div>
      <div>
        <span id="hud-level">Level 1</span>
      </div>
      <div>
        <span id="hud-lives">🐸🐸🐸</span>
      </div>
      <button id="mute-btn" aria-label="Mute audio" tabindex="-1">🔊</button>
    </div>
    <div id="timer-container">
      <div id="timer-bar"></div>
    </div>

    <div id="canvas-container">
      <canvas
        id="game-canvas"
        role="application"
        aria-label="Frogger game. Use arrow keys or WASD to move the frog. Space to start. P to pause. M to mute."
        tabindex="0"
      ></canvas>
    </div>

    <!-- D-pad for mobile -->
    <div id="dpad">
      <div class="dpad-row">
        <div class="dpad-placeholder"></div>
        <button class="dpad-btn" data-dpad="up" aria-label="Move up" tabindex="-1">▲</button>
        <div class="dpad-placeholder"></div>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" data-dpad="left" aria-label="Move left" tabindex="-1">◀</button>
        <button class="dpad-btn dpad-pause" data-dpad="pause" aria-label="Pause" tabindex="-1">II</button>
        <button class="dpad-btn" data-dpad="right" aria-label="Move right" tabindex="-1">▶</button>
      </div>
      <div class="dpad-row">
        <div class="dpad-placeholder"></div>
        <button class="dpad-btn" data-dpad="down" aria-label="Move down" tabindex="-1">▼</button>
        <div class="dpad-placeholder"></div>
      </div>
    </div>
  </div>

  <!-- Accessibility: aria-live regions -->
  <div id="aria-live-polite" aria-live="polite" class="sr-only"></div>
  <div id="aria-live-assertive" aria-live="assertive" class="sr-only"></div>

  <script type="module">
    import { Game } from './js/game.js';

    const canvas = document.getElementById('game-canvas');
    const game = new Game(canvas);

    // Auto-focus canvas for keyboard accessibility
    canvas.focus();

    // Enable input listeners immediately so idle screen responds to keys
    game.enableInput();

    // Mute button handler
    document.getElementById('mute-btn').addEventListener('click', () => {
      game.audio.init();
      const muted = game.audio.toggleMute();
      game.updateMuteButton(muted);
    });

    // Timer bar update (called from game loop via HUD update)
    const timerBar = document.getElementById('timer-bar');
    const originalUpdateHUD = game.updateHUD.bind(game);
    game.updateHUD = function () {
      originalUpdateHUD();
      const ratio = game.timer.getRatio();
      timerBar.style.width = (ratio * 100) + '%';
      if (game.timer.isDanger()) {
        timerBar.classList.add('danger');
      } else {
        timerBar.classList.remove('danger');
      }
    };
  </script>
</body>
</html>
