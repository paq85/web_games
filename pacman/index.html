<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PAC-MAN</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      touch-action: none;
      outline: none;
      /* Maintain 28:31 maze aspect ratio */
      aspect-ratio: 28 / 31;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
    }

    canvas:focus-visible {
      box-shadow: 0 0 0 3px #ffff00, 0 0 0 6px rgba(255, 255, 0, 0.4);
    }

    /* Screen-reader-only aria-live regions */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      canvas {
        image-rendering: pixelated;
      }
      /* Suppress CSS animations; game.js disables JS animations */
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Ensure 200% zoom usability */
    @media (min-resolution: 2dppx) {
      canvas {
        image-rendering: pixelated;
      }
    }
  </style>
</head>
<body>
  <canvas
    id="game"
    role="application"
    aria-label="Pacman game. Use arrow keys to move Pacman. Press Enter to select menu items. Press Escape to pause."
    tabindex="0"
    autofocus
  ></canvas>

  <!-- Accessibility: aria-live regions for screen readers -->
  <div id="aria-live-polite" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <div id="aria-live-assertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <script type="module">
    import { Game } from './game.js';

    const canvas = document.getElementById('game');
    const game = new Game(canvas);
    game.start();
  </script>
</body>
</html>
