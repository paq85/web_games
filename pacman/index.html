<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pac-Man</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="game-container" class="game-container">
    <canvas id="game-canvas" role="application" aria-label="Pac-Man game" tabindex="0"></canvas>

    <!-- Accessibility live regions -->
    <div id="aria-score" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="aria-status" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <!-- Touch controls overlay -->
    <div id="touch-controls" class="touch-controls" aria-hidden="true">
      <button class="touch-btn touch-up" data-dir="up" aria-label="Move up">&#9650;</button>
      <button class="touch-btn touch-left" data-dir="left" aria-label="Move left">&#9664;</button>
      <button class="touch-btn touch-right" data-dir="right" aria-label="Move right">&#9654;</button>
      <button class="touch-btn touch-down" data-dir="down" aria-label="Move down">&#9660;</button>
      <button class="touch-btn touch-pause" data-action="pause" aria-label="Pause game">&#10074;&#10074;</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
